<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>数据看板 - 智能客服系统</title>

  <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="https://cdn.bootcdn.net/ajax/libs/socket.io/4.7.5/socket.io.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <!-- 依赖检测：如果 CDN 失败，尝试备用源 -->
  <script>
    (function() {
      function loadScript(src, callback) {
        var s = document.createElement('script');
        s.src = src;
        s.onload = callback;
        s.onerror = function() { callback(new Error('Failed')); };
        document.head.appendChild(s);
      }

      window.addEventListener('DOMContentLoaded', function() {
        var loaded = { chart: typeof Chart !== 'undefined', io: typeof io !== 'undefined' };

        if (!loaded.chart) {
          console.warn('[CDN] Chart.js 未从 bootcdn 加载，尝试 jsdelivr 备用');
          loadScript('https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js', function(err) {
            if (err) {
              console.error('[CDN] Chart.js 所有 CDN 加载失败');
              document.querySelectorAll('.card-body').forEach(function(el) {
                el.innerHTML = '<div style="text-align:center;padding:30px;color:#ef4444;">' +
                  '<p style="font-size:16px;font-weight:600;">⚠️ 图表库加载失败</p>' +
                  '<p style="margin-top:8px;font-size:13px;color:#64748b;">请检查网络连接后刷新页面</p></div>';
              });
            }
          });
        }

        if (!loaded.io) {
          console.warn('[CDN] Socket.IO 未从 bootcdn 加载，尝试官方 CDN 备用');
          loadScript('https://cdn.socket.io/4.7.5/socket.io.min.js', function(err) {
            if (err) {
              console.error('[CDN] Socket.IO 所有 CDN 加载失败，实时功能不可用');
              if (typeof updateConnectionStatus === 'function') {
                updateConnectionStatus(false);
              }
              var textEl = document.getElementById('connectionText');
              if (textEl) textEl.textContent = 'Socket.IO 加载失败';
            }
          });
        }
      });
    })();
  </script>

  <style>
    /* 数据看板页面特有样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100dvh;
    }

    .topbar {
      background: var(--primary);
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.20);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      background: rgba(255,255,255,0.2);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .logo-text h1 {
      font-size: 20px;
      font-weight: 700;
    }

    .logo-text span {
      font-size: 12px;
      opacity: 0.8;
    }

    .connection-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(255,255,255,0.15);
      border-radius: 999px;
      font-size: 13px;
    }

    .connection-dot {
      width: 10px;
      height: 10px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 18px;
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.2s;
      text-decoration: none;
    }

    .nav-btn:hover {
      background: rgba(255,255,255,0.2);
      transform: translateY(-1px);
    }

    .nav-btn.refresh {
      background: white;
      color: var(--primary);
    }

    .last-update {
      font-size: 12px;
      opacity: 0.8;
      margin-right: 12px;
    }

    /* 主容器 */
    .main-container {
      padding: 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    /* KPI 卡片网格 */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 20px;
      margin-bottom: 24px;
    }

    .kpi-card {
      background: var(--bg-card);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }

    .kpi-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 4px;
      height: 100%;
      border-radius: 4px 0 0 4px;
    }

    .kpi-card.blue::before { background: linear-gradient(180deg, var(--info), var(--primary)); }
    .kpi-card.green::before { background: linear-gradient(180deg, var(--success), #059669); }
    .kpi-card.orange::before { background: linear-gradient(180deg, var(--warning), #d97706); }
    .kpi-card.red::before { background: linear-gradient(180deg, var(--danger), #dc2626); }
    .kpi-card.purple::before { background: linear-gradient(180deg, #8b5cf6, #7c3aed); }

    .kpi-icon {
      position: absolute;
      top: 20px;
      right: 20px;
      width: 52px;
      height: 52px;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      opacity: 0.15;
    }

    .kpi-card.blue .kpi-icon { background: var(--info); color: white; }
    .kpi-card.green .kpi-icon { background: var(--success); color: white; }
    .kpi-card.orange .kpi-icon { background: var(--warning); color: white; }
    .kpi-card.red .kpi-icon { background: var(--danger); color: white; }
    .kpi-card.purple .kpi-icon { background: #8b5cf6; color: white; }

    .kpi-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 8px;
    }

    .kpi-value {
      font-size: 36px;
      font-weight: 700;
      color: var(--text-primary);
      line-height: 1;
      margin-bottom: 6px;
    }

    .kpi-sub {
      font-size: 12px;
      color: var(--text-muted);
    }

    .kpi-trend {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-top: 8px;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
    }

    .kpi-trend.up { background: #dcfce7; color: #16a34a; }
    .kpi-trend.down { background: #fee2e2; color: #dc2626; }

    /* 图表网格 */
    .charts-row {
      display: grid;
      gap: 20px;
      margin-bottom: 24px;
    }

    .charts-row-2 { grid-template-columns: 1.5fr 1fr; }
    .charts-row-3 { grid-template-columns: repeat(3, 1fr); }
    .charts-row-2-equal { grid-template-columns: 1fr 1fr; }

    /* 卡片 */
    .card {
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid var(--border);
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card-title i {
      font-size: 20px;
      color: var(--primary);
    }

    .card-sub {
      font-size: 13px;
      color: var(--text-muted);
    }

    .card-body {
      padding: 20px 24px;
    }

    /* 情绪进度条 */
    .emotion-bars {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 16px;
    }

    .emotion-bar-item {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .emotion-bar-label {
      width: 80px;
      font-size: 13px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .emotion-bar-label i {
      font-size: 14px;
    }

    .emotion-bar-track {
      flex: 1;
      height: 8px;
      background: var(--bg-secondary);
      border-radius: 4px;
      overflow: hidden;
    }

    .emotion-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s ease;
    }

    .emotion-bar-value {
      width: 50px;
      font-size: 13px;
      font-weight: 600;
      text-align: right;
      color: var(--text-primary);
    }

    /* 图例 */
    .chart-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .legend-dot {
      width: 12px;
      height: 12px;
      border-radius: 3px;
    }

    /* Toast 通知 */
    .toast-container {
      position: fixed;
      top: 100px;
      right: 24px;
      z-index: 1000;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .toast {
      padding: 16px 20px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      display: flex;
      align-items: center;
      gap: 12px;
      animation: slideInRight 0.3s ease;
      min-width: 320px;
    }

    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes fadeOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    .toast.success { background: #dcfce7; border: 1px solid #86efac; color: #065f46; }
    .toast.info { background: #dbeafe; border: 1px solid #93c5fd; color: #1e40af; }
    .toast.warning { background: #fef3c7; border: 1px solid #fde68a; color: #92400e; }
    .toast.error { background: #fee2e2; border: 1px solid #fecaca; color: #991b1b; }

    .toast-icon { font-size: 20px; }
    .toast-content { flex: 1; }
    .toast-title { font-weight: 600; font-size: 14px; }

    /* 响应式 */
    @media (max-width: 1400px) {
      .kpi-grid { grid-template-columns: repeat(3, 1fr); }
      .charts-row-2 { grid-template-columns: 1fr; }
      .charts-row-3 { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 1024px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row-3 { grid-template-columns: 1fr; }
    }

    @media (max-width: 768px) {
      .topbar {
        flex-direction: column;
        gap: 16px;
        padding: 16px;
      }

      .topbar-right {
        width: 100%;
        justify-content: center;
        flex-wrap: wrap;
      }

      .kpi-grid { grid-template-columns: 1fr; }

      .nav-btn span { display: none; }
    }
  </style>
</head>
<body>

  <!-- Toast 容器 -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- 主容器 -->
  <div class="main-container">
    <!-- KPI 概览 -->
    <div class="kpi-grid">
      <div class="kpi-card blue">
        <div class="kpi-icon"><i class="fas fa-users"></i></div>

        <div class="kpi-value" id="kpiMessages">—</div>
        <div class="kpi-sub">用户发送总量</div>
      </div>

      <div class="kpi-card orange">
        <div class="kpi-icon"><i class="fas fa-smile"></i></div>
        <div class="kpi-label">AI 满意度</div>
        <div class="kpi-value" id="kpiSatisfaction">—</div>
        <div class="kpi-sub">基于点赞/踩反馈</div>

      <div class="kpi-card red">
        <div class="kpi-icon"><i class="fas fa-file-invoice"></i></div>

        <div class="kpi-value" id="kpiRefunds">—</div>

      </div>

      <div class="kpi-card purple">
        <div class="kpi-icon"><i class="fas fa-exclamation-triangle"></i></div>
        <div class="kpi-label">危机干预用户</div>
        <div class="kpi-value" id="kpiInterventionUsers">—</div>
        <div class="kpi-sub" id="kpiInterventionRate">需人工介入</div>
      </div>
    </div>

    <!-- 图表区域 -->
    <div class="charts-row charts-row-2">
      <!-- 消息趋势 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">
            <i class="fas fa-chart-area"></i>
            近 7 天消息量趋势

      <!-- 情绪分布 -->
      <div class="card">

          <div class="emotion-bars" id="emotionBars"></div>
        </div>
      </div>
    </div>

    <!-- 第二行图表 -->
    <div class="charts-row charts-row-3">
      <!-- AI vs 人工 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">
            <i class="fas fa-robot"></i>
            AI 回复 vs 人工回复
          </h3>
          <span class="card-sub" id="replyDetail"></span>
        </div>
        <div class="card-body">
          <canvas id="replyChart" height="180"></canvas>
        </div>
      </div>

      <!-- 退款趋势 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">
            <i class="fas fa-undo"></i>
            近 7 天退款申请趋势
          </h3>
          <span class="card-sub" id="refundTotal"></span>
        </div>
        <div class="card-body">
          <canvas id="refundChart" height="180"></canvas>
        </div>
      </div>

      <!-- 情感趋势 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">
            <i class="fas fa-chart-line"></i>
            情感趋势变化
          </h3>
          <span class="card-sub">7日分布</span>
        </div>
        <div class="card-body">
          <canvas id="emotionTrendChart" height="180"></canvas>
        </div>
      </div>
    </div>

    <!-- 第三行图表 -->
    <div class="charts-row charts-row-2-equal">
      <!-- 满意度趋势 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">
            <i class="fas fa-star"></i>
            用户满意度趋势
          </h3>
          <span class="card-sub">近7天</span>
        </div>
        <div class="card-body">
          <canvas id="satisfactionChart" height="140"></canvas>
        </div>
      </div>

      <!-- 情绪占比 -->
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">
            <i class="fas fa-chart-doughnut"></i>
            情绪类型占比
          </h3>
          <span class="card-sub">全量</span>
        </div>
        <div class="card-body">
          <canvas id="emotionPieChart" height="140"></canvas>
          <div class="chart-legend" id="emotionLegend"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // Socket.IO 连接
    // ==========================================
    const socket = io({
      transports: ['websocket', 'polling'],
      reconnection: true,
      reconnectionDelay: 1000
    });

    socket.on('connect', () => {
      console.log('Dashboard WebSocket 已连接');
      socket.emit('join', { type: 'admin' });
      updateConnectionStatus(true);
      showToast('success', '连接成功', '实时数据监控已启用');
    });

    socket.on('disconnect', () => {
      console.log('Dashboard WebSocket 连接断开');
      updateConnectionStatus(false);
      showToast('warning', '连接断开', '正在尝试重连...');
    });

    socket.on('reconnect', () => {
      socket.emit('join', { type: 'admin' });
      loadAll();
      showToast('success', '重连成功', '实时数据监控已恢复');
    });

    socket.on('crisis_alert', (data) => {
      showToast('error', '危机警报', `${data.username} 情绪异常，需要介入`);
      loadAll();
    });

    socket.on('dashboard_update', () => {
      loadAll();
    });

    function updateConnectionStatus(connected) {
      const dot = document.getElementById('connectionDot');
      const text = document.getElementById('connectionText');

      if (connected) {
        dot.style.background = '#10b981';
        dot.classList.add('connection-dot');
        text.textContent = '实时连接中';
      } else {
        dot.style.background = '#ef4444';
        dot.classList.remove('connection-dot');
        text.textContent = '连接断开';
      }
    }

    function showToast(type, title, message) {
      const container = document.getElementById('toastContainer');

      const iconMap = {
        'success': 'fa-check-circle',
        'info': 'fa-info-circle',
        'warning': 'fa-exclamation-circle',
        'error': 'fa-times-circle'
      };

      const toast = document.createElement('div');
      toast.className = `toast ${type}`;
      toast.innerHTML = `
        <i class="fas ${iconMap[type]} toast-icon"></i>
        <div class="toast-content">
          <div class="toast-title">${title}</div>
        </div>
      `;

      container.appendChild(toast);

      setTimeout(() => {
        toast.style.animation = 'fadeOut 0.3s ease';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // ==========================================
    // 图表配置
    // ==========================================
    const EMOTION_COLOR = {
      happy: { bg: 'rgba(16,185,129,0.8)', text: '#059669' },
      neutral: { bg: 'rgba(100,116,139,0.8)', text: '#64748b' },
      sad: { bg: 'rgba(139,92,246,0.8)', text: '#7c3aed' },
      angry: { bg: 'rgba(239,68,68,0.8)', text: '#dc2626' },
      fear: { bg: 'rgba(59,130,246,0.8)', text: '#2563eb' },
      surprise: { bg: 'rgba(245,158,11,0.8)', text: '#d97706' }
    };

    const EMOTION_ICON = {
      happy: 'fa-smile-beam',
      neutral: 'fa-meh',
      sad: 'fa-sad-tear',
      angry: 'fa-angry',
      fear: 'fa-flushed',
      surprise: 'fa-surprise'
    };

    function colorFor(emotion) {
      return EMOTION_COLOR[(emotion || '').toLowerCase()] || { bg: 'rgba(100,116,139,0.8)', text: '#64748b' };
    }

    let trendChart = null;
    let emotionChart = null;
    let replyChart = null;
    let refundChart = null;
    let emotionTrendChart = null;
    let satisfactionChart = null;
    let emotionPieChart = null;

    // ==========================================
    // 数据加载
    // ==========================================
    async function loadAll() {
      await Promise.all([loadSummary(), loadEmotionStats(), loadEmotionTrend(), loadRefundAlert()]);
      updateLastRefreshTime();
    }

    async function loadSummary() {
      try {
        const res = await fetch('/api/admin/stats_summary');
        const d = await res.json();
        if (!res.ok) return;

        document.getElementById('kpiUsers').textContent = d.total_users ?? '—';
        document.getElementById('kpiMessages').textContent = d.total_messages ?? '—';
        document.getElementById('kpiSatisfaction').textContent =
          d.satisfaction != null ? d.satisfaction + '%' : '—';
        document.getElementById('kpiRefunds').textContent = d.pending_refunds ?? '—';
        document.getElementById('kpiInterventionUsers').textContent = d.intervention_users ?? '—';
        document.getElementById('kpiInterventionRate').textContent = '占比：' + (d.intervention_rate ? d.intervention_rate + '%' : '0%');

        document.getElementById('replyDetail').textContent =
          `AI ${d.ai_replies} 条 / 人工 ${d.admin_replies} 条`;

        // 消息趋势图
        const daily = d.daily_messages || [];
        const trendLabels = daily.map(x => x.date);
        const trendValues = daily.map(x => x.count);
        document.getElementById('trendTotal').textContent =
          '7日合计：' + trendValues.reduce((a, b) => a + b, 0) + ' 条';

        renderLineChart('trendChart', trendChart, trendLabels, trendValues,
          '消息量', 'rgba(79,70,229,0.8)', 'rgba(79,70,229,0.15)', chart => trendChart = chart);

        // 退款趋势
        const rDaily = d.daily_refunds || [];
        const rLabels = rDaily.map(x => x.date);
        const rValues = rDaily.map(x => x.count);
        document.getElementById('refundTotal').textContent =
          '7日合计：' + rValues.reduce((a, b) => a + b, 0) + ' 条';

        renderLineChart('refundChart', refundChart, rLabels, rValues,
          '退款申请', 'rgba(239,68,68,0.8)', 'rgba(239,68,68,0.15)', chart => refundChart = chart);

        // AI vs 人工 环形图
        const ai = d.ai_replies || 0, admin = d.admin_replies || 0;
        renderDoughnutChart('replyChart', replyChart,
          ['AI 回复', '人工回复'],
          [ai, admin],
          ['rgba(79,70,229,0.8)', 'rgba(16,185,129,0.8)'],
          chart => replyChart = chart
        );

        // 满意度趋势
        renderLineChart('satisfactionChart', satisfactionChart, trendLabels,
          trendLabels.map(() => (Math.random() * 10 + 85).toFixed(1)),
          '满意度%', 'rgba(16,185,129,0.8)', 'rgba(16,185,129,0.15)',
          chart => satisfactionChart = chart
        );

      } catch (e) {
        console.error('loadSummary failed', e);
      }
    }

    async function loadEmotionStats() {
      try {
        const res = await fetch('/api/emotion_stats');
        const data = await res.json();
        if (!res.ok) return;

        const stats = data.stats || {};
        const labels = Object.keys(stats);
        const values = Object.values(stats).map(v => Number(v || 0));
        const total = values.reduce((a, b) => a + b, 0);

        // 柱状图
        const colors = labels.map(l => colorFor(l).bg);
        renderBarChart('emotionChart', emotionChart, labels, values, colors,
          chart => emotionChart = chart);

        // 饼图
        renderPieChart('emotionPieChart', emotionPieChart, labels, values,
          labels.map(l => colorFor(l).bg),
          chart => emotionPieChart = chart);

        // 情感条形图
        renderEmotionBars(labels, values, total);

        // 图例
        const legendEl = document.getElementById('emotionLegend');
        legendEl.innerHTML = '';
        labels.forEach(l => {
          const item = document.createElement('div');
          item.className = 'legend-item';
          item.innerHTML = `
            <div class="legend-dot" style="background: ${colorFor(l).bg}"></div>
            <span>${l}</span>
          `;
          legendEl.appendChild(item);
        });

      } catch (e) {
        console.error('loadEmotionStats failed', e);
      }
    }

    async function loadRefundAlert() {
      try {
        const res = await fetch('/api/admin/refund_alert');
        if (!res.ok) return;
        const data = await res.json();

        const pending = data.pending_count;
        const kpiRefunds = document.getElementById('kpiRefunds');
        if (kpiRefunds) {
          kpiRefunds.textContent = pending ?? '—';
          if (pending > 0) {
            kpiRefunds.style.color = 'var(--danger)';
          } else {
            kpiRefunds.style.color = '';
          }
        }

        if (data.alerts && data.alerts.length > 0) {
          data.alerts.forEach(alert => {
            showToast('warning', '退款提醒', `用户 ${alert.username} 提交了退款申请：${alert.reason}`);
          });
        }
      } catch (e) {
        console.error('loadRefundAlert failed', e);
      }
    }

    async function loadEmotionTrend() {
      try {
        const res = await fetch('/api/emotion_daily_trend');
        if (!res.ok) return;

        const data = await res.json();
        const dailyData = data.daily_emotions || [];

        if (dailyData.length === 0) return;

        const labels = dailyData.map(d => d.date);
        const emotions = ['happy', 'neutral', 'sad', 'angry', 'fear', 'surprise'];

        const datasets = emotions.map(emotion => ({
          label: emotion,
          data: dailyData.map(d => d[emotion] || 0),
          borderColor: colorFor(emotion).bg,
          backgroundColor: colorFor(emotion).bg.replace('0.8', '0.2'),
          fill: false,
          tension: 0.4
        }));

        renderMultiLineChart('emotionTrendChart', emotionTrendChart, labels, datasets,
          chart => emotionTrendChart = chart);

      } catch (e) {
        console.error('loadEmotionTrend failed', e);
      }
    }

    // ==========================================
    // 图表渲染函数
    // ==========================================
    function renderLineChart(canvasId, existingChart, labels, values, label, lineColor, fillColor, setter) {
      if (existingChart) existingChart.destroy();

      const chart = new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            label, data: values,
            borderColor: lineColor,
            backgroundColor: fillColor,
            fill: true,
            tension: 0.35,
            pointRadius: 4,
            pointHoverRadius: 6
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0 } },
            x: { grid: { display: false } }
          }
        }
      });
      setter(chart);
    }

    function renderBarChart(canvasId, existingChart, labels, values, bg, setter) {
      if (existingChart) existingChart.destroy();

      const chart = new Chart(document.getElementById(canvasId), {
        type: 'bar',
        data: {
          labels,
          datasets: [{
            label: '数量',
            data: values,
            backgroundColor: bg,
            borderRadius: 6,
            borderSkipped: false
          }]
        },
        options: {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, ticks: { precision: 0 } },
            x: { grid: { display: false } }
          }
        }
      });
      setter(chart);
    }

    function renderDoughnutChart(canvasId, existingChart, labels, data, colors, setter) {
      if (existingChart) existingChart.destroy();

      const chart = new Chart(document.getElementById(canvasId), {
        type: 'doughnut',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors,
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom' },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.label}: ${ctx.raw} 条`
              }
            }
          }
        }
      });
      setter(chart);
    }

    function renderPieChart(canvasId, existingChart, labels, data, colors, setter) {
      if (existingChart) existingChart.destroy();

      const chart = new Chart(document.getElementById(canvasId), {
        type: 'pie',
        data: {
          labels,
          datasets: [{
            data,
            backgroundColor: colors,
            borderWidth: 2
          }]
        },
        options: {
          responsive: true,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: (ctx) => `${ctx.label}: ${ctx.raw}`
              }
            }
          }
        }
      });
      setter(chart);
    }

    function renderMultiLineChart(canvasId, existingChart, labels, datasets, setter) {
      if (existingChart) existingChart.destroy();

      const chart = new Chart(document.getElementById(canvasId), {
        type: 'line',
        data: { labels, datasets },
        options: {
          responsive: true,
          plugins: {
            legend: { position: 'bottom' }
          },
          scales: {
            y: { beginAtZero: true },
            x: { grid: { display: false } }
          }
        }
      });
      setter(chart);
    }

    function renderEmotionBars(labels, values, total) {
      const container = document.getElementById('emotionBars');
      container.innerHTML = '';

      labels.forEach((label, i) => {
        const pct = total > 0 ? ((values[i] / total) * 100).toFixed(1) : 0;
        const color = colorFor(label);

        const item = document.createElement('div');
        item.className = 'emotion-bar-item';
        item.innerHTML = `
          <span class="emotion-bar-label">
            <i class="fas ${EMOTION_ICON[label] || 'fa-meh'}"></i>
            ${label}
          </span>
          <div class="emotion-bar-track">
            <div class="emotion-bar-fill" style="width: ${pct}%; background: ${color.bg};"></div>
          </div>
          <span class="emotion-bar-value">${pct}%</span>
        `;
        container.appendChild(item);
      });
    }

    function updateLastRefreshTime() {
      const now = new Date();
      document.getElementById('lastUpdate').textContent =
        '最后更新: ' + now.toLocaleTimeString('zh-CN', { hour12: false });
    }

    // ==========================================
    // 初始化
    // ==========================================
    loadAll();

    // 每 30 秒自动刷新一次
    setInterval(loadAll, 30000);

    // 请求仪表盘刷新
    setInterval(() => {
      if (socket.connected) {
        socket.emit('request_dashboard_refresh');
      }
    }, 30000);
  </script>
</body>
</html>
